<script>
    window.searchResultTitleTemplate = "#PAGES_COUNT 个结果 （用时 #TIME_SECONDS 秒）"
    
    
    document.addEventListener('DOMContentLoaded', function() {
        const heatmapWrapper = document.getElementById('search-heatmap-container');
        const heatmapContainer = document.getElementById('search-heatmap');
        const searchInput = document.querySelector('input[name="keyword"]');
        const searchResultContainer = document.querySelector('.search-result');
        const searchForm = document.querySelector('form.search-form');
        const statsCard = document.getElementById('site-stats-card');
        const clearBtn = document.getElementById('search-clear');

        if (!heatmapWrapper || !heatmapContainer) {
            return;
        }
        if (typeof echarts === 'undefined') {
            heatmapContainer.innerHTML = '<div style="text-align:center;padding:16px;color:#888;">热力图脚本加载失败</div>';
            return;
        }
        
        
        const articleDates = [
            
            "2026-04-18",
            
            "2026-04-18",
            
            "2026-04-18",
            
            "2026-04-18",
            
            "2026-04-11",
            
            "2026-04-10",
            
            "2026-04-08",
            
            "2026-04-08",
            
            "2026-04-06",
            
            "2026-04-05",
            
            "2026-04-04",
            
            "2026-03-29",
            
            "2026-03-27",
            
            "2026-03-26",
            
            "2026-03-26",
            
            "2026-03-25",
            
            "2026-03-21",
            
            "2026-03-20",
            
            "2026-03-11",
            
            "2026-03-11",
            
            "2026-02-04",
            
            "2026-02-04",
            
            "2026-02-03",
            
            "2026-02-02",
            
            "2026-02-01",
            
            "2026-02-01",
            
        ];

        
        const dateCounts = {};
        if (articleDates.length > 0) {
            articleDates.forEach(date => {
                dateCounts[date] = (dateCounts[date] || 0) + 1;
            });
        }

        
        const heatmapData = Object.keys(dateCounts).map(date => [date, dateCounts[date]]);
        const totalPosts = articleDates.length;
        
        
        const maxCount = heatmapData.length > 0 ? Math.max(...Object.values(dateCounts), 5) : 5;

        
        function formatDate(date) {
            var d = new Date(date),
                month = '' + (d.getMonth() + 1),
                day = '' + d.getDate(),
                year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            return [year, month, day].join('-');
        }
        
        const now = new Date();
        const todayStr = formatDate(now);
        const oneYearAgoDate = new Date();
        oneYearAgoDate.setFullYear(now.getFullYear() - 1);
        const oneYearAgoStr = formatDate(oneYearAgoDate);

        
        let chart = null;
        
        
        let isDarkMode = document.documentElement.dataset.scheme === 'dark' || 
                         window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        
        const lightTheme = {
            text: '#666',
            empty: '#ebedf0',
            border: '#fff',
            green: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39']
        };
        const darkTheme = {
            text: '#ccc',
            empty: '#161b22',
            border: '#0d1117',
            green: ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353']
        };

        let currentTheme = isDarkMode ? darkTheme : lightTheme;

        
        function getOption(theme) {
            return {
                title: {
                    show: false
                },
                tooltip: {
                    position: 'top',
                    borderWidth: 0,
                    backgroundColor: 'rgba(0,0,0,0.72)',
                    textStyle: { color: '#fff', fontSize: 12 },
                    formatter: function (p) {
                        return p.data[0] + ': ' + p.data[1] + ' 篇文章';
                    }
                },
                visualMap: {
                    min: 0,
                    max: 10,
                    calculable: false,
                    orient: 'horizontal',
                    left: 'center',
                    bottom: 0,
                    type: 'piecewise',
                    pieces: [
                        {value: 0, color: theme.empty, label: '0'},
                        {min: 1, max: 2, color: theme.green[1], label: '1-2'},
                        {min: 3, max: 4, color: theme.green[2], label: '3-4'},
                        {min: 5, max: 6, color: theme.green[3], label: '5-6'},
                        {min: 7, max: 100, color: theme.green[4], label: '7+'}
                    ],
                    textStyle: { color: theme.text },
                    show: true,
                    itemWidth: 14,
                    itemHeight: 14,
                    itemGap: 8
                },
                calendar: {
                    top: 24,
                    bottom: 36,
                    left: 28, 
                    right: 20, 
                    cellSize: ['auto', 17],
                    range: [oneYearAgoStr, todayStr], 
                    itemStyle: {
                        borderWidth: 2.5,
                        borderColor: 'rgba(0,0,0,0)', 
                        color: theme.empty 
                    },
                    yearLabel: { show: false },
                    dayLabel: {
                        firstDay: 1,
                        nameMap: 'cn',
                        color: theme.text
                    },
                    monthLabel: {
                        nameMap: 'cn',
                        color: theme.text,
                        margin: 8
                    },
                    splitLine: { show: false }
                },
                series: {
                    type: 'heatmap',
                    coordinateSystem: 'calendar',
                    data: heatmapData,
                    itemStyle: {
                        borderRadius: 2.5
                    }
                }
            };
        }

        const meta = document.getElementById('heatmap-meta');
        if (meta) {
            meta.innerHTML = '';
        }

        
        const statPosts = document.getElementById('stat-posts');
        if (statPosts) {
            statPosts.textContent = totalPosts;
        }

        const statDays = document.getElementById('stat-days');
        if (statDays) {
            
            const sinceRaw = '2026';
            const sinceStr = sinceRaw.length <= 4 ? `${sinceRaw}-01-01` : sinceRaw;
            const start = new Date(sinceStr.replace(/\./g, '-'));
            const nowDate = new Date();
            const days = isNaN(start.getTime()) ? 0 : Math.max(0, Math.floor((nowDate - start) / (1000 * 60 * 60 * 24)));
            statDays.textContent = days;
        }

        function initChart() {
            if (chart || heatmapData.length === 0) {
                if (heatmapData.length === 0) {
                    heatmapContainer.innerHTML = '<div style="text-align:center;padding:16px;color:#888;">暂无文章数据</div>';
                }
                return;
            }

            chart = echarts.init(heatmapContainer, null, { renderer: 'svg' });
            chart.setOption(getOption(currentTheme));

            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === "attributes" && mutation.attributeName === "data-scheme") {
                        isDarkMode = document.documentElement.dataset.scheme === 'dark';
                        currentTheme = isDarkMode ? darkTheme : lightTheme;
                        if (chart) chart.setOption(getOption(currentTheme));
                    }
                });
            });
            observer.observe(document.documentElement, { attributes: true });

            window.addEventListener('resize', function() {
                if (chart) chart.resize();
            });
        }

        function initWhenVisible() {
            if ('IntersectionObserver' in window) {
                const io = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            initChart();
                            io.disconnect();
                        }
                    });
                }, { threshold: 0.1 });
                io.observe(heatmapWrapper);
            } else {
                initChart();
            }
        }

        initWhenVisible();

        
        function toggleHeatmap() {
            const hasQuery = searchInput && searchInput.value.trim() !== '';
            heatmapWrapper.style.display = hasQuery ? 'none' : 'block';
            if (statsCard) {
                statsCard.style.display = hasQuery ? 'none' : 'grid';
            }
            searchResultContainer.style.display = 'block';
        }
        
        
        searchInput.addEventListener('input', toggleHeatmap);
        
        searchInput.addEventListener('change', toggleHeatmap);
        
        if (searchForm) {
            searchForm.addEventListener('submit', function() {
                toggleHeatmap();
            });
        }

        
        const params = new URLSearchParams(window.location.search);
        const q = params.get('keyword');
        if (q && searchInput) {
            searchInput.value = q;
        }
        toggleHeatmap();
        
        
        toggleHeatmap();
    });

<script>
 
(() => {
  const toastStack = document.getElementById('toast-stack');
  let toastCount = 0;
  const MAX_TOAST = 5;
  const DURATION  = 2500;

   
  let lastText = '';
  let lastTime = 0;

  window.pushToast = function (msg = '✅ 哎嘿！复制成功 🍬') {
    const now = Date.now();
    if (msg === lastText && now - lastTime < 500) return; 
    lastText = msg;
    lastTime = now;

     
    if (toastCount >= MAX_TOAST) toastStack.firstElementChild?.closeToast();

    const item = document.createElement('div');
    item.className = 'snack-left-top';
    item.textContent = msg;

    let closeTimer = null;
    function closeToast() {
      if (item.isClosing) return;
      item.isClosing = true;
      item.classList.remove('show');
      item.addEventListener('transitionend', () => {
        item.remove();
        toastCount--;
      }, { once: true });
      clearTimeout(closeTimer);
    }
    item.closeToast = closeToast;

    toastStack.appendChild(item);
    toastCount++;
    void item.offsetWidth;
    item.classList.add('show');
    closeTimer = setTimeout(closeToast, DURATION);
  };

   
  document.addEventListener('copy', e => {
    const text = window.getSelection().toString().trim();
    if (!text) return;
    e.preventDefault();
    navigator.clipboard.writeText(text)
      .then(() => pushToast())
      .catch(console.warn);
  });

   
  const container = document.querySelector('.article-content');
  if (container) {
    container.addEventListener('click', e => {
      if (!e.target.matches('.copyCodeButton')) return;
      const wrap = e.target.closest('pre, .highlight');
      const codeTd = wrap?.querySelector('td:nth-child(2)') || wrap;
      const txt = codeTd ? codeTd.textContent.trim() : '';
      navigator.clipboard.writeText(txt)
        .then(() => pushToast())
        .catch(err => alert('复制失败：' + err));
    });
  }
})();
</script>

            let openUl = document.querySelectorAll(".open");

                ul.classList.remove("open")
              })
            }
            
            let currentLi = document.querySelector(".active-class");

            }

                ul.classList.add("open");

            } while (ul !== undefined && (ul.localName === 'ul' || ul.localName === 'ol'))
        });
